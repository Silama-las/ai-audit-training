<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ведущий квиз</title>
  <style>
    :root {
      --bg: #f6f4ee;
      --card: #ffffff;
      --line: #e2ddd0;
      --ink: #171b22;
      --dim: #5d6673;
      --pink: #e91e63;
      --green: #2e7d32;
      --red: #c0392b;
      --mono: 'JetBrains Mono', ui-monospace, Consolas, monospace;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      padding: 12px 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hidden {
      display: none !important;
    }

    .wrap {
      width: 100%;
      max-width: 1120px;
      height: calc(100vh - 24px);
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 10px;
    }

    .topline {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .brand {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--pink);
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    h1 {
      font-size: 24px;
      font-weight: 800;
    }

    .status {
      font-size: 14px;
      color: var(--dim);
      white-space: nowrap;
    }

    .main-grid {
      min-height: 0;
      display: grid;
      grid-template-columns: 1fr 230px;
      gap: 12px;
    }

    .poll-area,
    .side,
    .results {
      background: var(--card);
      border-radius: 18px;
      box-shadow: 0 1px 2px rgba(23,27,34,.05);
    }

    .poll-area {
      min-height: 0;
      padding: 18px 22px;
      display: flex;
      flex-direction: column;
    }

    .placeholder {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: var(--dim);
      font-size: 20px;
      line-height: 1.35;
    }

    .question-content {
      min-height: 0;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .question-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: start;
      margin-bottom: 12px;
    }

    .question-head h2 {
      font-size: clamp(20px, 2.4vw, 30px);
      line-height: 1.18;
      font-weight: 800;
    }

    .timer {
      min-width: 110px;
      text-align: center;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px 12px;
      color: var(--pink);
      font-size: 24px;
      font-weight: 800;
    }

    .timer-label {
      display: block;
      color: var(--dim);
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .bars {
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
      justify-content: center;
    }

    .bar-row {
      display: grid;
      grid-template-columns: minmax(260px, 42%) 1fr 58px;
      align-items: center;
      gap: 12px;
    }

    .bar-label {
      font-size: clamp(14px, 1.5vw, 18px);
      line-height: 1.25;
      font-weight: 650;
      overflow-wrap: anywhere;
    }

    .bar-label.correct-label {
      color: var(--green);
      font-weight: 800;
    }

    .bar-track {
      height: 28px;
      background: #f0ede8;
      border-radius: 999px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      width: 0%;
      background: var(--pink);
      border-radius: 999px;
      transition: width .25s;
    }

    .bar-fill.correct {
      background: var(--green);
    }

    .bar-count {
      height: 28px;
      min-width: 48px;
      padding: 0 10px;
      border-radius: 999px;
      background: #f0ede8;
      color: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 14px;
    }

    .total {
      margin-top: 12px;
      color: var(--dim);
      font-size: 14px;
    }

    .side {
      padding: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 0;
    }

    .qr-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--pink);
      text-align: center;
      line-height: 1.4;
    }

    #qrcode {
      background: #fff;
      padding: 8px;
      border-radius: 12px;
    }

    .controls {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      background: var(--pink);
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    button.secondary {
      background: #ddd;
      color: #333;
    }

    button.danger {
      background: var(--red);
    }

    button:disabled {
      opacity: .45;
      cursor: default;
    }

    .results {
      padding: 18px 22px;
      min-height: 0;
      overflow: hidden;
    }

    .results h2 {
      font-size: 24px;
      margin-bottom: 12px;
      text-align: center;
    }

    .lb-row {
      display: grid;
      grid-template-columns: 44px 1fr 70px;
      gap: 8px;
      align-items: center;
      border-bottom: 1px solid var(--line);
      padding: 7px 0;
      font-size: 16px;
    }

    .lb-row:last-child {
      border-bottom: none;
    }

    .lb-rank {
      color: var(--dim);
      font-weight: 800;
    }

    .lb-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .lb-score {
      text-align: right;
      color: var(--pink);
      font-weight: 800;
    }

    .footer {
      text-align: center;
      color: #98a0ab;
      font-family: var(--mono);
      font-size: 10px;
    }
  </style>
</head>
<body>
<div class="wrap">
  <div>
    <div class="topline">
      <div class="brand">ИИ для аудиторов · квиз</div>
      <div class="status" id="status">Ожидание старта</div>
    </div>
    <div class="header">
      <h1>Ведущий</h1>
    </div>
  </div>

  <div class="main-grid">
    <div id="pollDisplay" class="poll-area">
      <div id="questionPlaceholder" class="placeholder">
        Нажмите «Старт» для начала квиза
      </div>

      <div id="questionContent" class="question-content hidden">
        <div class="question-head">
          <h2 id="questionText"></h2>
          <div class="timer">
            <span class="timer-label">секунд</span>
            <span id="timerSec">15</span>
          </div>
        </div>

        <div class="bars" id="barsContainer"></div>

        <div class="total">
          Всего голосов: <span id="totalVotes">0</span>
        </div>
      </div>
    </div>

    <div class="side">
      <div class="qr-label">Сканируйте для голосования</div>
      <div id="qrcode"></div>

      <div class="controls">
        <button id="startBtn">Старт</button>
        <button id="resultsBtn" class="secondary" disabled>Результаты</button>
        <button id="resetBtn" class="danger">Сброс</button>
      </div>
    </div>

    <div id="resultsBlock" class="results hidden">
      <h2>Результаты</h2>
      <div id="resultsList"></div>
    </div>
  </div>

  <div class="footer">квиз · все данные анонимны</div>
</div>

<script src="config.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
const QUESTIONS = {
  q1: {
    q: 'Что может утечь при использовании внешней модели по API?',
    options: ['промпт и ответ в логах', 'данные для дообучения', 'всё вышеперечисленное'],
    correct: 2,
    time: 15
  },
  q2: {
    q: 'Что нельзя отправлять во внешние модели?',
    options: ['шаблоны договоров', 'обезличенные данные', 'персональные и финансовые данные'],
    correct: 2,
    time: 15
  },
  q3: {
    q: 'Какой промпт даст структурированный результат при проверке договора?',
    options: [
      '«Проверь договор аренды»',
      '«Найди риски для арендатора»',
      '«Проверь по чек-листу: индексация, разрыв, штрафы, субаренда. Дай цитату, риск и оценку»'
    ],
    correct: 2,
    time: 15
  },
  q4: {
    q: 'Какой из перечисленных инструментов Яндекса представляет собой веб-агента без установки?',
    options: ['Стефания', 'MARS', 'Гена (GENA)', 'Клешня Алисы Про'],
    correct: 3,
    time: 15
  },
  q5: {
    q: 'Что такое MCP в контексте AI-агентов?',
    options: [
      'метод машинного обучения',
      'стандарт подключения модели к сервисам («розетка» для инструментов)',
      'тип языковой модели',
      'способ шифрования данных'
    ],
    correct: 1,
    time: 15
  },
  q6: {
    q: 'Что такое «промпт» в контексте работы языковых моделей?',
    options: [
      'алгоритм обучения модели',
      'запрос или инструкция, подаваемая на вход модели',
      'метод оценки качества ответов модели',
      'тип нейросети'
    ],
    correct: 1,
    time: 15
  },
  q7: {
    q: 'Сколько уровней ИИ выделяется в рамках представленной классификации?',
    options: ['3', '4', '5', '6'],
    correct: 2,
    time: 15
  }
};

const cfg = window.QUIZ_CONFIG || {};
if (!cfg.firebase) {
  document.body.innerHTML = '<h1>Ошибка: нет config.js</h1>';
  throw new Error('config missing');
}

firebase.initializeApp(cfg.firebase);
const db = firebase.database();

const voteUrl = cfg.voteUrl || 'https://Silama-las.github.io/ai-audit-training/vote-ai-audit-training.html';

if (typeof QRCode !== 'undefined') {
  new QRCode(document.getElementById("qrcode"), {
    text: voteUrl,
    width: 180,
    height: 180
  });
}

const statusDiv = document.getElementById('status');
const startBtn = document.getElementById('startBtn');
const resetBtn = document.getElementById('resetBtn');
const resultsBtn = document.getElementById('resultsBtn');
const questionPlaceholder = document.getElementById('questionPlaceholder');
const questionContent = document.getElementById('questionContent');
const questionText = document.getElementById('questionText');
const timerSec = document.getElementById('timerSec');
const barsContainer = document.getElementById('barsContainer');
const totalVotesSpan = document.getElementById('totalVotes');
const resultsBlock = document.getElementById('resultsBlock');
const resultsList = document.getElementById('resultsList');
const pollDisplay = document.getElementById('pollDisplay');

const questionOrder = ['q1','q2','q3','q4','q5','q6','q7'];

let currentIndex = -1;
let timerInterval = null;
let revealTimeout = null;
let currentQid = null;
let quizFinished = false;
let sessionId = Date.now();

async function startQuiz() {
  console.log('startQuiz clicked');

  if (timerInterval) clearInterval(timerInterval);
  if (revealTimeout) clearTimeout(revealTimeout);

  sessionId = Date.now();
  currentIndex = 0;
  currentQid = null;
  quizFinished = false;

  startBtn.disabled = true;
  resultsBtn.disabled = true;

  resultsBlock.classList.add('hidden');
  pollDisplay.classList.remove('hidden');

  await db.ref('responses').set(null);

  await db.ref('state').set({
    session: sessionId,
    quizStatus: 'running',
    showResults: false,
    currentPoll: null
  });

  showQuestion(0);
}

async function showQuestion(index) {
  if (index >= questionOrder.length) {
    finishQuiz();
    return;
  }

  const qid = questionOrder[index];
  const qData = QUESTIONS[qid];

  currentQid = qid;

  if (timerInterval) clearInterval(timerInterval);
  if (revealTimeout) clearTimeout(revealTimeout);

  questionPlaceholder.classList.add('hidden');
  questionContent.classList.remove('hidden');
  resultsBlock.classList.add('hidden');
  pollDisplay.classList.remove('hidden');

  questionText.textContent = qData.q;
  timerSec.textContent = qData.time;
  totalVotesSpan.textContent = '0';

  barsContainer.innerHTML = '';

  qData.options.forEach((opt, i) => {
    const row = document.createElement('div');
    row.className = 'bar-row';
    row.innerHTML = `
      <div class="bar-label" id="label-${qid}-${i}">${esc(opt)}</div>
      <div class="bar-track">
        <div class="bar-fill" id="bar-${qid}-${i}"></div>
      </div>
      <div class="bar-count" id="count-${qid}-${i}">0</div>
    `;
    barsContainer.appendChild(row);
  });

  statusDiv.textContent = `Вопрос ${index + 1} из ${questionOrder.length}`;

  await db.ref('state/currentPoll').set({
    id: qid,
    q: qData.q,
    options: qData.options,
    correct: qData.correct,
    time: qData.time,
    index: index,
    total: questionOrder.length,
    status: 'active',
    session: sessionId,
    startedAtClient: Date.now()
  });

  updateBars(qid);

  let remaining = qData.time;

  timerInterval = setInterval(async () => {
    remaining--;
    timerSec.textContent = remaining;

    if (remaining <= 0) {
      clearInterval(timerInterval);
      timerInterval = null;

      await db.ref('state/currentPoll/status').set('revealed');

      revealCorrect(qid);

      revealTimeout = setTimeout(() => {
        currentIndex++;
        showQuestion(currentIndex);
      }, 2500);
    }
  }, 1000);
}

function revealCorrect(qid) {
  const qData = QUESTIONS[qid];
  if (!qData) return;

  const correctIdx = qData.correct;

  const bar = document.getElementById(`bar-${qid}-${correctIdx}`);
  const label = document.getElementById(`label-${qid}-${correctIdx}`);

  if (bar) bar.classList.add('correct');
  if (label) label.classList.add('correct-label');

  statusDiv.textContent = `Вопрос ${currentIndex + 1} из ${questionOrder.length}`;
}

function updateBars(qid) {
  const qData = QUESTIONS[qid];
  if (!qData) return;

  const counts = new Array(qData.options.length).fill(0);

  db.ref('responses/' + qid).once('value', (snap) => {
    const data = snap.val();

    if (data) {
      Object.values(data).forEach(resp => {
        const idx = Number(resp.answer);
        if (idx >= 0 && idx < counts.length) counts[idx]++;
      });
    }

    const total = counts.reduce((a, b) => a + b, 0);
    totalVotesSpan.textContent = total;

    qData.options.forEach((opt, i) => {
      const bar = document.getElementById(`bar-${qid}-${i}`);
      const count = document.getElementById(`count-${qid}-${i}`);

      if (bar) {
        const pct = total > 0 ? Math.round((counts[i] / total) * 100) : 0;
        bar.style.width = pct + '%';
      }

      if (count) {
        count.textContent = counts[i];
      }
    });
  });
}

async function finishQuiz() {
  if (timerInterval) clearInterval(timerInterval);
  if (revealTimeout) clearTimeout(revealTimeout);

  currentQid = null;
  quizFinished = true;

  await db.ref('state').update({
    currentPoll: null,
    quizStatus: 'finished'
  });

  questionContent.classList.add('hidden');
  questionPlaceholder.classList.remove('hidden');
  questionPlaceholder.textContent = 'Квиз завершён. Нажмите «Результаты», чтобы показать топ-10.';
  statusDiv.textContent = 'Квиз завершён';

  resultsBtn.disabled = false;
}

async function showResults() {
  const scores = {};
  const names = {};

  for (const qid of questionOrder) {
    const qData = QUESTIONS[qid];
    const snap = await db.ref('responses/' + qid).once('value');
    const data = snap.val();

    if (!data) continue;

    Object.entries(data).forEach(([key, resp]) => {
      const displayName = resp.name || key;

      if (!scores[key]) scores[key] = 0;
      names[key] = displayName;

      if (Number(resp.answer) === qData.correct) {
        scores[key]++;
      }
    });
  }

  const sorted = Object.entries(scores)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 10);

  pollDisplay.classList.add('hidden');
  resultsBlock.classList.remove('hidden');
  statusDiv.textContent = 'Результаты';

  await db.ref('state/showResults').set(true);

  if (sorted.length === 0) {
    resultsList.innerHTML = '<div style="text-align:center;color:var(--dim);padding:12px;">Нет участников</div>';
    return;
  }

  resultsList.innerHTML = sorted.map(([key, score], idx) => `
    <div class="lb-row">
      <div class="lb-rank">${idx + 1}</div>
      <div class="lb-name">${esc(names[key] || key)}</div>
      <div class="lb-score">${score}</div>
    </div>
  `).join('');
}

async function resetAll() {
  if (!confirm('Сбросить все данные и начать заново?')) return;

  if (timerInterval) clearInterval(timerInterval);
  if (revealTimeout) clearTimeout(revealTimeout);

  sessionId = Date.now();
  currentIndex = -1;
  currentQid = null;
  quizFinished = false;

  await db.ref('responses').set(null);
  await db.ref('state').set({
    session: sessionId,
    quizStatus: 'idle',
    currentPoll: null,
    showResults: false,
    resetAt: Date.now()
  });

  startBtn.disabled = false;
  resultsBtn.disabled = true;

  questionContent.classList.add('hidden');
  questionPlaceholder.classList.remove('hidden');
  questionPlaceholder.textContent = 'Нажмите «Старт» для начала квиза';

  pollDisplay.classList.remove('hidden');
  resultsBlock.classList.add('hidden');
  resultsList.innerHTML = '';

  barsContainer.innerHTML = '';
  totalVotesSpan.textContent = '0';
  timerSec.textContent = '15';
  statusDiv.textContent = 'Ожидание старта';
}

startBtn.addEventListener('click', startQuiz);
resetBtn.addEventListener('click', resetAll);
resultsBtn.addEventListener('click', showResults);

db.ref('responses').on('value', () => {
  if (currentQid) updateBars(currentQid);
});

function esc(s) {
  return String(s).replace(/[&<>"]/g, c => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;'
  }[c]));
}
</script>
</body>
</html>
