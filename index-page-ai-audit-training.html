<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ведущий квиз</title>
  <style>
    /* === Дизайн от коллеги === */
    :root{--bg:#f6f4ee;--card:#ffffff;--line:#e2ddd0;--ink:#171b22;--dim:#5d6673;
      --blue:#2049c7;--green:#187a52;
      --mono:'JetBrains Mono',ui-monospace,Consolas,monospace}
    *{margin:0;padding:0;box-sizing:border-box}
    body{min-height:100vh;background:var(--bg);color:var(--ink);
      font-family:'Inter',system-ui,-apple-system,sans-serif;
      padding:30px;display:flex;flex-direction:column}
    .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px}
    .header h1{font-size:28px}
    .poll-area{background:var(--card);border-radius:20px;padding:30px;box-shadow:0 1px 2px rgba(23,27,34,.05);margin-bottom:30px}
    .poll-area h2{font-size:26px;margin-bottom:20px}
    .bars{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
    .bar-row{display:flex;align-items:center;gap:12px}
    .bar-label{width:120px;font-weight:500}
    .bar-track{flex:1;height:32px;background:#f0ede8;border-radius:16px;overflow:hidden;position:relative}
    .bar-fill{height:100%;background:var(--blue);border-radius:16px;transition:width .3s;width:0%;display:flex;align-items:center;justify-content:flex-end;padding-right:10px;color:#fff;font-weight:600;font-size:14px}
    .bar-fill.correct{background:var(--green)}
    .total{font-size:14px;color:var(--dim);margin-bottom:10px}
    .leaderboard{background:var(--card);border-radius:20px;padding:25px;box-shadow:0 1px 2px rgba(23,27,34,.05);max-height:420px;overflow-y:auto}
    .leaderboard h3{font-size:20px;margin-bottom:15px}
    .lb-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line)}
    .lb-row:last-child{border-bottom:none}
    .lb-rank{font-weight:700;color:var(--dim);width:40px}
    .lb-name{flex:1}
    .lb-score{font-weight:700;color:var(--blue)}
    .controls{margin-top:20px;display:flex;gap:12px;flex-wrap:wrap}
    .controls button{padding:10px 20px;border:none;border-radius:10px;background:var(--blue);color:#fff;font-weight:600;cursor:pointer;font-family:inherit}
    .controls button.secondary{background:#ddd;color:#333}
    .controls button.danger{background:#c0392b}
    .status{font-size:14px;color:var(--dim);margin-top:10px}
    .hidden{display:none}
    .timer{font-weight:700;color:var(--blue);font-size:20px}
    .qr-block{background:var(--card);border-radius:20px;padding:20px;margin-top:20px;text-align:center;box-shadow:0 1px 2px rgba(23,27,34,.05)}
    .qr-block .qr-label{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--blue);margin-bottom:10px}
    .top{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--blue);margin-bottom:20px}
    .foot{margin-top:auto;padding-top:30px;font-family:var(--mono);font-size:11px;color:#98a0ab;text-align:center}
  </style>
</head>
<body>
<div class="top">ИИ для аудиторов · квиз · ведущий</div>

<div class="header">
  <h1>🎯 Квиз</h1>
  <div class="status" id="status">Ожидание вопроса</div>
</div>

<div id="pollDisplay" class="poll-area">
  <div id="questionPlaceholder" style="text-align:center;padding:40px;color:var(--dim);">
    Нажмите «Следующий вопрос», чтобы начать
  </div>
  <div id="questionContent" class="hidden">
    <h2 id="questionText"></h2>
    <div id="timerDisplay" class="timer">⏱️ <span id="timerSec">0</span> сек</div>
    <div class="bars" id="barsContainer"></div>
    <div class="total">Всего голосов: <span id="totalVotes">0</span></div>
  </div>
</div>

<!-- QR-код -->
<div class="qr-block">
  <div class="qr-label">Сканируйте для голосования</div>
  <div id="qrcode" style="display:inline-block;background:#fff;padding:10px;border-radius:12px;"></div>
  <div style="margin-top:10px;font-size:14px;color:var(--dim);word-break:break-all;" id="qrUrlDisplay"></div>
</div>

<div class="leaderboard">
  <h3>🏆 Топ‑10 участников</h3>
  <div id="leaderboardList">
    <div style="color:var(--dim);padding:10px 0;">Пока нет данных</div>
  </div>
</div>

<div class="controls">
  <button id="nextBtn">➡️ Следующий вопрос</button>
  <button id="resetBtn" class="danger">🔄 Сбросить все голоса</button>
  <button id="manualBtn" class="secondary">👆 Ручной режим (M)</button>
</div>

<div class="foot">голос анонимный · один голос на вопрос</div>

<script src="config.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
// ===== КОНФИГУРАЦИЯ ВОПРОСОВ (ваши 7 вопросов) =====
const QUESTIONS = {
  q1: {
    q: 'Что может утечь при использовании внешней модели по API?',
    options: ['промпт и ответ в логах', 'данные для дообучения', 'всё вышеперечисленное'],
    correct: 2,
    time: 20
  },
  q2: {
    q: 'Что нельзя отправлять во внешние модели?',
    options: ['шаблоны договоров', 'обезличенные данные', 'персональные и финансовые данные'],
    correct: 2,
    time: 20
  },
  q3: {
    q: 'Какой промпт даст структурированный результат при проверке договора?',
    options: [
      '«Проверь договор аренды»',
      '«Найди риски для арендатора»',
      '«Проверь по чек‑листу: индексация, разрыв, штрафы, субаренда. Дай цитату, риск и оценку»'
    ],
    correct: 2,
    time: 20
  },
  q4: {
    q: 'Какой из перечисленных инструментов Яндекса представляет собой веб‑агента без установки (работает с Календарём, Трекером, Вики, Почтой)?',
    options: ['Стефания', 'MARS', 'Гена (GENA)', 'Клешня Алисы Про'],
    correct: 3,
    time: 20
  },
  q5: {
    q: 'Что такое MCP в контексте AI‑агентов?',
    options: [
      'метод машинного обучения',
      'стандарт подключения модели к сервисам («розетка» для инструментов)',
      'тип языковой модели',
      'способ шифрования данных'
    ],
    correct: 1,
    time: 20
  },
  q6: {
    q: 'Что такое «промпт» в контексте работы языковых моделей?',
    options: [
      'алгоритм обучения модели',
      'запрос или инструкция, подаваемая на вход модели',
      'метод оценки качества ответов модели',
      'тип нейросети'
    ],
    correct: 1,
    time: 20
  },
  q7: {
    q: 'Сколько уровней ИИ выделяется в рамках представленной классификации?',
    options: ['3', '4', '5', '6'],
    correct: 2,
    time: 20
  }
};

// ===== FIREBASE =====
const cfg = window.QUIZ_CONFIG || {};
if (!cfg.firebase) {
  document.body.innerHTML = '<h1>Ошибка: нет config.js</h1>';
  throw new Error('config missing');
}
firebase.initializeApp(cfg.firebase);
const db = firebase.database();

// ===== QR-код =====
const voteUrl = cfg.voteUrl || window.location.href.replace('index-page-ai-audit-training.html','vote-ai-audit-training.html');
if (typeof QRCode !== 'undefined') {
  new QRCode(document.getElementById("qrcode"), {
    text: voteUrl,
    width: 200,
    height: 200
  });
  document.getElementById('qrUrlDisplay').textContent = voteUrl;
} else {
  document.getElementById('qrcode').innerHTML = '⚠️ QR-библиотека не загружена';
}

// ===== СОСТОЯНИЕ =====
let currentQuestionId = null;
let questionOrder = ['q1','q2','q3','q4','q5','q6','q7'];
let currentIndex = -1;
let timerTimeout = null;
let isAnsweredRevealed = false;

// Ссылки на DOM
const pollDisplay = document.getElementById('pollDisplay');
const questionPlaceholder = document.getElementById('questionPlaceholder');
const questionContent = document.getElementById('questionContent');
const questionText = document.getElementById('questionText');
const timerSec = document.getElementById('timerSec');
const barsContainer = document.getElementById('barsContainer');
const totalVotesSpan = document.getElementById('totalVotes');
const leaderboardList = document.getElementById('leaderboardList');
const statusDiv = document.getElementById('status');

// ===== ОТОБРАЖЕНИЕ ТЕКУЩЕГО ВОПРОСА =====
function showQuestion(questionId) {
  if (timerTimeout) { clearTimeout(timerTimeout); timerTimeout = null; }
  const qData = QUESTIONS[questionId];
  if (!qData) return;

  currentQuestionId = questionId;
  isAnsweredRevealed = false;

  questionPlaceholder.classList.add('hidden');
  questionContent.classList.remove('hidden');
  questionText.textContent = qData.q;
  timerSec.textContent = qData.time;

  barsContainer.innerHTML = '';
  qData.options.forEach((opt, i) => {
    const row = document.createElement('div');
    row.className = 'bar-row';
    row.innerHTML = `
      <div class="bar-label">${esc(opt)}</div>
      <div class="bar-track">
        <div class="bar-fill" id="bar-${questionId}-${i}" style="width:0%;">0</div>
      </div>
    `;
    barsContainer.appendChild(row);
  });

  updateBars(questionId);
  startTimer(questionId, qData.time);

  db.ref('state/currentPoll').set({
    id: questionId,
    q: qData.q,
    options: qData.options,
    correct: qData.correct
  });

  statusDiv.textContent = `Вопрос ${questionId} активен`;
}

function startTimer(questionId, seconds) {
  let remaining = seconds;
  timerSec.textContent = remaining;

  timerTimeout = setInterval(() => {
    remaining--;
    timerSec.textContent = remaining;
    if (remaining <= 0) {
      clearInterval(timerTimeout);
      timerTimeout = null;
      revealCorrectAnswer(questionId);
    }
  }, 1000);
}

function revealCorrectAnswer(questionId) {
  if (isAnsweredRevealed) return;
  isAnsweredRevealed = true;
  const qData = QUESTIONS[questionId];
  if (!qData) return;
  const correctIdx = qData.correct;
  const correctBar = document.getElementById(`bar-${questionId}-${correctIdx}`);
  if (correctBar) {
    correctBar.classList.add('correct');
  }
  statusDiv.textContent = `✅ Правильный ответ: ${qData.options[correctIdx]}`;
}

function updateBars(questionId) {
  const qData = QUESTIONS[questionId];
  if (!qData) return;
  const counts = new Array(qData.options.length).fill(0);
  db.ref('responses/' + questionId).once('value', (snap) => {
    const data = snap.val();
    if (data) {
      Object.values(data).forEach(resp => {
        const idx = resp.answer;
        if (idx >= 0 && idx < counts.length) counts[idx]++;
      });
    }
    const total = counts.reduce((a,b) => a + b, 0);
    document.getElementById('totalVotes').textContent = total;
    qData.options.forEach((opt, i) => {
      const bar = document.getElementById(`bar-${questionId}-${i}`);
      if (bar) {
        const pct = total > 0 ? Math.round((counts[i] / total) * 100) : 0;
        bar.style.width = pct + '%';
        bar.textContent = counts[i] > 0 ? counts[i] : '';
      }
    });
    updateLeaderboard();
  });
}

// ===== РЕЙТИНГ (ТОП‑10) =====
async function updateLeaderboard() {
  const allQuestions = Object.keys(QUESTIONS);
  const scores = {};

  for (const qid of allQuestions) {
    const qData = QUESTIONS[qid];
    const snap = await db.ref('responses/' + qid).once('value');
    const data = snap.val();
    if (!data) continue;
    Object.entries(data).forEach(([userName, resp]) => {
      if (resp.answer === qData.correct) {
        scores[userName] = (scores[userName] || 0) + 1;
      }
    });
  }

  const sorted = Object.entries(scores)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 10);

  if (sorted.length === 0) {
    leaderboardList.innerHTML = `<div style="color:var(--dim);padding:10px 0;">Пока нет данных</div>`;
    return;
  }

  let html = '';
  sorted.forEach(([name, score], idx) => {
    let medal;
    if (idx === 0) medal = '🥇';
    else if (idx === 1) medal = '🥈';
    else if (idx === 2) medal = '🥉';
    else medal = `${idx+1}.`;
    html += `
      <div class="lb-row">
        <span class="lb-rank">${medal}</span>
        <span class="lb-name">${esc(name)}</span>
        <span class="lb-score">${score} балл${score>1?'а':''}</span>
      </div>
    `;
  });
  leaderboardList.innerHTML = html;
}

// ===== УПРАВЛЕНИЕ =====
function nextQuestion() {
  if (currentIndex < questionOrder.length - 1) {
    currentIndex++;
    showQuestion(questionOrder[currentIndex]);
  } else {
    statusDiv.textContent = 'Все вопросы пройдены!';
    questionContent.classList.add('hidden');
    questionPlaceholder.classList.remove('hidden');
    questionPlaceholder.innerHTML = '🎉 Квиз завершён! Спасибо всем участникам.';
    db.ref('state/currentPoll').set(null);
  }
}

function resetAll() {
  if (confirm('Удалить все ответы участников?')) {
    db.ref('responses').set(null);
    db.ref('polls').set(null);
    db.ref('state/session').set(Date.now());
    statusDiv.textContent = 'Все данные сброшены';
    currentIndex = -1;
    questionContent.classList.add('hidden');
    questionPlaceholder.classList.remove('hidden');
    questionPlaceholder.innerHTML = 'Нажмите «Следующий вопрос», чтобы начать';
    leaderboardList.innerHTML = '<div style="color:var(--dim);padding:10px 0;">Пока нет данных</div>';
    if (timerTimeout) clearTimeout(timerTimeout);
  }
}

// ===== РУЧНОЙ РЕЖИМ =====
let manualMode = false;
document.getElementById('manualBtn').addEventListener('click', () => {
  manualMode = !manualMode;
  document.getElementById('manualBtn').style.background = manualMode ? 'var(--green)' : '#ddd';
  statusDiv.textContent = manualMode ? 'Ручной режим: клик по столбику = голос' : 'Ожидание';
});
document.addEventListener('click', (e) => {
  if (!manualMode) return;
  const bar = e.target.closest('.bar-fill');
  if (!bar) return;
  const idMatch = bar.id.match(/bar-(q\d+)-(\d+)/);
  if (!idMatch) return;
  const qid = idMatch[1];
  const idx = parseInt(idMatch[2]);
  const qData = QUESTIONS[qid];
  if (!qData) return;
  const userName = 'Manual_' + Date.now();
  db.ref('responses/' + qid + '/' + userName).set({
    name: userName,
    answer: idx,
    timestamp: firebase.database.ServerValue.TIMESTAMP
  }).then(() => {
    updateBars(qid);
  });
});

document.getElementById('nextBtn').addEventListener('click', nextQuestion);
document.getElementById('resetBtn').addEventListener('click', resetAll);

function esc(s) { return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

// ===== ПОДПИСКИ =====
db.ref('responses').on('child_added', () => {
  if (currentQuestionId) updateBars(currentQuestionId);
});
db.ref('responses').on('child_changed', () => {
  if (currentQuestionId) updateBars(currentQuestionId);
});
db.ref('responses').on('child_removed', () => {
  if (currentQuestionId) updateBars(currentQuestionId);
});
db.ref('responses').on('value', () => {
  updateLeaderboard();
});

// Инициализация
questionPlaceholder.classList.remove('hidden');
questionContent.classList.add('hidden');
statusDiv.textContent = 'Готов к работе';

// Горячие клавиши
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') nextQuestion();
  if (e.key === 'r' && currentQuestionId) revealCorrectAnswer(currentQuestionId);
  if (e.key === 'm') document.getElementById('manualBtn').click();
});

</script>
</body>
</html>
