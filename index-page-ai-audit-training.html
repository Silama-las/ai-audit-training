<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ведущий · Квиз</title>
<style>
  :root {
    --bg: #f6f4ee;
    --card: #ffffff;
    --line: #e5e0d3;
    --ink: #171b22;
    --dim: #7b8290;
    --pink: #e91e63;
    --pink-soft: #fce4ec;
    --green: #2e7d32;
    --green-soft: #e8f5e9;
    --red: #c0392b;
    --red-soft: #fdecea;
    --mono: 'JetBrains Mono', ui-monospace, Consolas, monospace;
    --ease: cubic-bezier(.4,0,.2,1);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; }
  body {
    background:
      radial-gradient(1200px 500px at 100% -10%, #fde3ec 0%, transparent 55%),
      radial-gradient(900px 500px at -10% 110%, #e6f3e7 0%, transparent 55%),
      var(--bg);
    color: var(--ink);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    padding: 14px 20px;
    display:flex; align-items:center; justify-content:center;
  }
  .hidden { display:none !important; }
  .wrap {
    width:100%; max-width:1140px; height:calc(100vh - 28px);
    display:grid; grid-template-rows:auto 1fr; gap:12px;
  }
  .topline { display:flex; justify-content:space-between; align-items:center; }
  .brand { font-family:var(--mono); font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:var(--pink); }
  .brand b { color:var(--ink); }
  .status-pill {
    font-size:13px; font-weight:700; color:var(--dim);
    background:var(--card); border:1px solid var(--line);
    padding:6px 14px; border-radius:999px;
  }
  .status-pill.live { color:var(--pink); border-color:var(--pink-soft); background:var(--pink-soft); }

  .progress-dots { display:flex; gap:6px; align-items:center; }
  .dot { width:8px; height:8px; border-radius:50%; background:var(--line); transition: all .3s var(--ease); }
  .dot.done { background:var(--green); }
  .dot.now { background:var(--pink); width:20px; border-radius:5px; }

  .main-grid { min-height:0; display:grid; grid-template-columns:1fr 240px; gap:14px; }
  .poll-area, .side, .results {
    background:var(--card); border-radius:20px; border:1px solid var(--line);
    box-shadow: 0 2px 14px rgba(23,27,34,.04);
  }
  .poll-area { min-height:0; padding:24px 28px; display:flex; flex-direction:column; }

  .placeholder {
    flex:1; display:flex; flex-direction:column; gap:8px;
    align-items:center; justify-content:center; text-align:center; color:var(--dim);
  }
  .placeholder .big { font-size:22px; font-weight:800; color:var(--ink); }
  .placeholder .small { font-size:14px; color:var(--dim); max-width:360px; }

  .question-content { min-height:0; display:flex; flex-direction:column; height:100%; }
  .qmeta { font-family:var(--mono); font-size:11px; letter-spacing:.1em; color:var(--dim); text-transform:uppercase; margin-bottom:10px; }
  .question-head { display:grid; grid-template-columns:1fr auto; gap:20px; align-items:start; margin-bottom:16px; }
  .question-head h2 { font-size:clamp(20px,2.3vw,29px); line-height:1.2; font-weight:800; }

  .timer {
    min-width:104px; text-align:center; border:1px solid var(--line); border-radius:16px;
    padding:10px 14px; color:var(--pink); position:relative; overflow:hidden;
  }
  .timer-label { display:block; color:var(--dim); font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; margin-bottom:2px; }
  .timer-num { font-size:26px; font-weight:900; font-variant-numeric:tabular-nums; }
  .timer-bar { position:absolute; left:0; bottom:0; height:3px; background:var(--pink); width:100%; transition:width .2s linear; }
  .timer.done .timer-num, .timer.done .timer-bar { color:var(--green); background:var(--green); }

  .bars { min-height:0; display:flex; flex-direction:column; gap:11px; flex:1; justify-content:center; }
  .bar-row { display:grid; grid-template-columns:minmax(240px,42%) 1fr 56px; align-items:center; gap:12px; }
  .bar-label { font-size:clamp(14px,1.4vw,17px); line-height:1.25; font-weight:650; overflow-wrap:anywhere; transition:color .25s; }
  .bar-label.correct-label { color:var(--green); font-weight:800; }
  .bar-label.wrong-label { color:var(--red); }
  .bar-track { height:26px; background:#f0ede8; border-radius:999px; overflow:hidden; }
  .bar-fill { height:100%; width:0%; background:var(--pink); border-radius:999px; transition:width .5s var(--ease), background .3s; }
  .bar-fill.correct { background:var(--green); }
  .bar-count {
    height:26px; min-width:46px; padding:0 10px; border-radius:999px; background:#f0ede8;
    display:flex; align-items:center; justify-content:center; font-weight:800; font-size:13px; transition:background .3s,color .3s;
  }
  .bar-count.correct { background:var(--green-soft); color:var(--green); }

  .total { margin-top:14px; color:var(--dim); font-size:13px; font-weight:600; }

  .side { padding:16px; display:flex; flex-direction:column; align-items:center; justify-content:space-between; gap:14px; min-height:0; }
  .qr-label { font-family:var(--mono); font-size:9.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--pink); text-align:center; line-height:1.5; }
  #qrcode { background:#fff; padding:8px; border-radius:14px; border:1px solid var(--line); }
  .controls { width:100%; display:flex; flex-direction:column; gap:8px; }
  button {
    border:none; border-radius:12px; padding:11px 14px; background:var(--pink); color:#fff;
    font-family:inherit; font-size:14px; font-weight:750; cursor:pointer; transition:transform .12s, opacity .2s, background .2s;
  }
  button:hover:not(:disabled) { transform:translateY(-1px); }
  button:active:not(:disabled) { transform:translateY(0); }
  button.secondary { background:#eceae3; color:#3a3f47; }
  button.danger { background:transparent; color:var(--red); border:1px solid #f0d4cf; }
  button:disabled { opacity:.4; cursor:default; transform:none; }

  .results { grid-column: 1 / -1; padding:22px 30px; min-height:0; overflow:hidden; display:flex; flex-direction:column; max-width:640px; margin:0 auto; width:100%; }
  .results-head { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:4px; }
  .results-head h2 { font-size:22px; margin:0; }
  .results-head button { width:auto; padding:9px 16px; font-size:13px; }
  .results .sub { text-align:center; color:var(--dim); font-size:13px; margin-bottom:14px; }
  .lb-row {
    display:grid; grid-template-columns:36px 1fr 60px; gap:8px; align-items:center;
    border-bottom:1px solid var(--line); padding:8px 2px; font-size:15px;
  }
  .lb-row:last-child { border-bottom:none; }
  .lb-row.top1 .lb-rank { color:var(--pink); }
  .lb-rank { color:var(--dim); font-weight:800; }
  .lb-name { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-weight:600; }
  .lb-score { text-align:right; color:var(--pink); font-weight:800; }
  .empty-note { text-align:center; color:var(--dim); padding:20px; }

  canvas#confetti { position:fixed; inset:0; pointer-events:none; z-index:50; }
</style>
</head>
<body>
<canvas id="confetti" class="hidden"></canvas>
<div class="wrap">
  <div class="topline">
    <div class="brand"><b>ИИ для аудиторов</b> · ведущий</div>
    <div style="display:flex; align-items:center; gap:12px;">
      <div class="progress-dots" id="progressDots"></div>
      <div class="status-pill" id="status">Ожидание старта</div>
    </div>
  </div>

  <div class="main-grid">
    <div id="pollDisplay" class="poll-area">
      <div id="questionPlaceholder" class="placeholder">
        <div class="big">Готовы начать?</div>
        <div class="small">Нажмите «Старт» — вопрос появится и у ведущего, и у всех участников одновременно.</div>
      </div>

      <div id="questionContent" class="question-content hidden">
        <div class="qmeta" id="qmeta">Вопрос 1 из 7</div>
        <div class="question-head">
          <h2 id="questionText"></h2>
          <div class="timer" id="timerBox">
            <span class="timer-label">секунд</span>
            <span class="timer-num" id="timerSec">15</span>
            <div class="timer-bar" id="timerBar"></div>
          </div>
        </div>
        <div class="bars" id="barsContainer"></div>
        <div class="total">Всего голосов: <span id="totalVotes">0</span></div>
      </div>
    </div>

    <div class="side">
      <div class="qr-label">Сканируйте<br>для участия</div>
      <div id="qrcode"></div>
      <div class="controls">
        <button id="startBtn">Старт</button>
        <button id="resultsBtn" class="secondary" disabled>Результаты</button>
        <button id="resetBtn" class="danger">Сброс</button>
      </div>
    </div>

    <div id="resultsBlock" class="results hidden">
      <div class="results-head">
        <h2>🏆 Топ участников</h2>
        <button id="resultsResetBtn" class="secondary">Новый квиз</button>
      </div>
      <div class="sub" id="resultsSub"></div>
      <div id="resultsList" style="overflow-y:auto;"></div>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
/* ---------- Questions (shared shape with voter page) ---------- */
const QUESTIONS = {
  q1: { q:'Что может утечь при использовании внешней модели по API?', options:['промпт и ответ в логах','данные для дообучения','всё вышеперечисленное'], correct:2, time:15 },
  q2: { q:'Что нельзя отправлять во внешние модели?', options:['шаблоны договоров','обезличенные данные','персональные и финансовые данные'], correct:2, time:15 },
  q3: { q:'Какой промпт даст структурированный результат при проверке договора?', options:['«Проверь договор аренды»','«Найди риски для арендатора»','«Проверь по чек-листу: индексация, разрыв, штрафы, субаренда. Дай цитату, риск и оценку»'], correct:2, time:15 },
  q4: { q:'Какой из перечисленных инструментов Яндекса представляет собой веб-агента без установки?', options:['Стефания','MARS','Гена (GENA)','Клешня Алисы Про'], correct:3, time:15 },
  q5: { q:'Что такое MCP в контексте AI-агентов?', options:['метод машинного обучения','стандарт подключения модели к сервисам («розетка» для инструментов)','тип языковой модели','способ шифрования данных'], correct:1, time:15 },
  q6: { q:'Что такое «промпт» в контексте работы языковых моделей?', options:['алгоритм обучения модели','запрос или инструкция, подаваемая на вход модели','метод оценки качества ответов модели','тип нейросети'], correct:1, time:15 },
  q7: { q:'Сколько уровней ИИ выделяется в рамках представленной классификации?', options:['3','4','5','6'], correct:2, time:15 }
};
const QUESTION_ORDER = ['q1','q2','q3','q4','q5','q6','q7'];
const REVEAL_DELAY_MS = 2500;

const cfg = window.QUIZ_CONFIG || {};
if (!cfg.firebase) { document.body.innerHTML = '<h1>Ошибка: нет config.js</h1>'; throw new Error('config missing'); }
firebase.initializeApp(cfg.firebase);
const db = firebase.database();
const voteUrl = cfg.voteUrl || 'https://Silama-las.github.io/ai-audit-training/vote-ai-audit-training.html';

if (typeof QRCode !== 'undefined') {
  new QRCode(document.getElementById("qrcode"), { text: voteUrl, width:170, height:170 });
}

/* ---------- Server-synced clock ---------- */
let serverOffset = 0;
db.ref('.info/serverTimeOffset').on('value', snap => { serverOffset = snap.val() || 0; });
function serverNow() { return Date.now() + serverOffset; }

/* ---------- DOM refs ---------- */
const statusDiv = document.getElementById('status');
const progressDots = document.getElementById('progressDots');
const startBtn = document.getElementById('startBtn');
const resetBtn = document.getElementById('resetBtn');
const resultsBtn = document.getElementById('resultsBtn');
const questionPlaceholder = document.getElementById('questionPlaceholder');
const questionContent = document.getElementById('questionContent');
const qmeta = document.getElementById('qmeta');
const questionText = document.getElementById('questionText');
const timerBox = document.getElementById('timerBox');
const timerSec = document.getElementById('timerSec');
const timerBar = document.getElementById('timerBar');
const barsContainer = document.getElementById('barsContainer');
const totalVotesSpan = document.getElementById('totalVotes');
const resultsBlock = document.getElementById('resultsBlock');
const resultsSub = document.getElementById('resultsSub');
const resultsList = document.getElementById('resultsList');
const pollDisplay = document.getElementById('pollDisplay');

/* ---------- State ---------- */
let latestState = { status: 'idle' };
let responsesCache = {};
let transitionLock = false;
let uiTicker = null;

QUESTION_ORDER.forEach((_, i) => {
  const d = document.createElement('div');
  d.className = 'dot';
  d.id = 'dot-' + i;
  progressDots.appendChild(d);
});

/* ---------- Firebase listeners (single source of truth) ---------- */
db.ref('state').on('value', snap => {
  latestState = snap.val() || { status: 'idle' };
  render();
});
db.ref('responses').on('value', snap => {
  responsesCache = snap.val() || {};
  render();
});

/* ---------- Director: advances the quiz based on server time ---------- */
setInterval(directorTick, 300);

function directorTick() {
  if (transitionLock) return;
  const st = latestState;
  if (!st || !st.status) return;
  const now = serverNow();

  if (st.status === 'active') {
    const elapsed = now - (st.startedAt || now);
    if (elapsed >= (st.duration || 15) * 1000) {
      transitionLock = true;
      db.ref('state').update({ status:'revealed', revealedAt: firebase.database.ServerValue.TIMESTAMP })
        .catch(console.error)
        .finally(() => setTimeout(() => transitionLock = false, 400));
    }
  } else if (st.status === 'revealed') {
    const elapsed = now - (st.revealedAt || now);
    if (elapsed >= REVEAL_DELAY_MS) {
      transitionLock = true;
      const nextIndex = (st.index ?? 0) + 1;
      const p = nextIndex >= QUESTION_ORDER.length
        ? db.ref('state').update({ status:'finished' })
        : openQuestion(st.session, nextIndex);
      p.catch(console.error).finally(() => setTimeout(() => transitionLock = false, 400));
    }
  }
}

function openQuestion(session, index) {
  const qid = QUESTION_ORDER[index];
  return db.ref('state').set({
    session,
    status: 'active',
    qid,
    index,
    total: QUESTION_ORDER.length,
    duration: QUESTIONS[qid].time,
    startedAt: firebase.database.ServerValue.TIMESTAMP,
    revealedAt: null
  });
}

/* ---------- Controls ---------- */
async function startQuiz() {
  startBtn.disabled = true;
  resultsBtn.disabled = true;
  resultsBlock.classList.add('hidden');
  pollDisplay.classList.remove('hidden');
  document.querySelector('.side').classList.remove('hidden');
  const session = Date.now();
  await db.ref('responses').set(null);
  await openQuestion(session, 0);
}

async function resetAll() {
  if (!confirm('Сбросить все данные и начать заново?')) return;
  await db.ref('responses').set(null);
  await db.ref('state').set({ status:'idle' });
  resultsBlock.classList.add('hidden');
  pollDisplay.classList.remove('hidden');
  document.querySelector('.side').classList.remove('hidden');
  resultsList.innerHTML = '';
  startBtn.disabled = false;
  resultsBtn.disabled = true;
}

async function showResults() {
  const snap = await db.ref('responses').once('value');
  const data = snap.val() || {};
  const scores = {}, names = {};

  QUESTION_ORDER.forEach(qid => {
    const qData = QUESTIONS[qid];
    const qResp = data[qid];
    if (!qResp) return;
    Object.entries(qResp).forEach(([key, resp]) => {
      names[key] = resp.name || key;
      if (!(key in scores)) scores[key] = 0;
      if (Number(resp.answer) === qData.correct) scores[key]++;
    });
  });

  const sorted = Object.entries(scores).sort((a,b) => b[1]-a[1]).slice(0, 15);

  pollDisplay.classList.add('hidden');
  document.querySelector('.side').classList.add('hidden');
  resultsBlock.classList.remove('hidden');
  statusDiv.textContent = 'Результаты';
  statusDiv.classList.remove('live');

  if (sorted.length === 0) {
    resultsSub.textContent = '';
    resultsList.innerHTML = '<div class="empty-note">Пока нет участников</div>';
    return;
  }

  resultsSub.textContent = `из ${QUESTION_ORDER.length} вопросов`;
  resultsList.innerHTML = sorted.map(([key, score], idx) => `
    <div class="lb-row ${idx===0 ? 'top1':''}">
      <div class="lb-rank">${idx===0 ? '🥇' : idx===1 ? '🥈' : idx===2 ? '🥉' : idx+1}</div>
      <div class="lb-name">${esc(names[key] || key)}</div>
      <div class="lb-score">${score}</div>
    </div>
  `).join('');

  fireConfetti();
}

startBtn.addEventListener('click', startQuiz);
resetBtn.addEventListener('click', resetAll);
resultsBtn.addEventListener('click', showResults);
document.getElementById('resultsResetBtn').addEventListener('click', resetAll);

/* ---------- Rendering ---------- */
let renderedQid = null;

function render() {
  const st = latestState;
  const status = st.status || 'idle';

  progressDots.classList.toggle('hidden', status === 'idle');
  QUESTION_ORDER.forEach((_, i) => {
    const d = document.getElementById('dot-' + i);
    d.classList.remove('done','now');
    if (status !== 'idle') {
      if (i < (st.index ?? -1)) d.classList.add('done');
      else if (i === (st.index ?? -1) && status !== 'finished') d.classList.add('now');
      else if (status === 'finished') d.classList.add('done');
    }
  });

  if (status === 'idle') {
    startBtn.disabled = false;
    resultsBtn.disabled = true;
    questionContent.classList.add('hidden');
    questionPlaceholder.classList.remove('hidden');
    questionPlaceholder.querySelector('.big').textContent = 'Готовы начать?';
    questionPlaceholder.querySelector('.small').textContent = 'Нажмите «Старт» — вопрос появится и у ведущего, и у всех участников одновременно.';
    statusDiv.textContent = 'Ожидание старта';
    statusDiv.classList.remove('live');
    stopTicker();
    return;
  }

  if (status === 'finished') {
    startBtn.disabled = true;
    resultsBtn.disabled = false;
    questionContent.classList.add('hidden');
    questionPlaceholder.classList.remove('hidden');
    questionPlaceholder.querySelector('.big').textContent = 'Квиз завершён 🎉';
    questionPlaceholder.querySelector('.small').textContent = 'Нажмите «Результаты», чтобы показать топ.';
    statusDiv.textContent = 'Квиз завершён';
    statusDiv.classList.remove('live');
    stopTicker();
    return;
  }

  // active or revealed
  startBtn.disabled = true;
  resultsBtn.disabled = true;
  questionPlaceholder.classList.add('hidden');
  questionContent.classList.remove('hidden');
  statusDiv.textContent = `Вопрос ${(st.index ?? 0)+1} из ${st.total || QUESTION_ORDER.length}`;
  statusDiv.classList.add('live');

  const qid = st.qid;
  const qData = QUESTIONS[qid];
  if (!qData) return;

  if (renderedQid !== qid) {
    renderedQid = qid;
    qmeta.textContent = `Вопрос ${(st.index ?? 0)+1} из ${QUESTION_ORDER.length}`;
    questionText.textContent = qData.q;
    barsContainer.innerHTML = qData.options.map((opt, i) => `
      <div class="bar-row">
        <div class="bar-label" id="label-${i}">${esc(opt)}</div>
        <div class="bar-track"><div class="bar-fill" id="bar-${i}"></div></div>
        <div class="bar-count" id="count-${i}">0</div>
      </div>
    `).join('');
  }

  renderBars(qid, qData);
  startTicker();
}

function renderBars(qid, qData) {
  const responses = responsesCache[qid] || {};
  const counts = new Array(qData.options.length).fill(0);
  Object.values(responses).forEach(r => {
    const idx = Number(r.answer);
    if (idx >= 0 && idx < counts.length) counts[idx]++;
  });
  const total = counts.reduce((a,b)=>a+b,0);
  totalVotesSpan.textContent = total;

  const revealed = latestState.status === 'revealed';
  qData.options.forEach((opt, i) => {
    const bar = document.getElementById('bar-'+i);
    const count = document.getElementById('count-'+i);
    const label = document.getElementById('label-'+i);
    const pct = total > 0 ? Math.round((counts[i]/total)*100) : 0;
    if (bar) bar.style.width = pct + '%';
    if (count) count.textContent = counts[i];
    if (revealed && i === qData.correct) {
      bar?.classList.add('correct');
      count?.classList.add('correct');
      label?.classList.add('correct-label');
    } else {
      bar?.classList.remove('correct');
      count?.classList.remove('correct');
      label?.classList.remove('correct-label');
    }
  });
}

function startTicker() {
  stopTicker();
  uiTicker = setInterval(tickTimer, 100);
  tickTimer();
}
function stopTicker() { if (uiTicker) { clearInterval(uiTicker); uiTicker = null; } }

function tickTimer() {
  const st = latestState;
  if (!st || (st.status !== 'active' && st.status !== 'revealed')) return;
  const duration = st.duration || 15;

  if (st.status === 'revealed') {
    timerSec.textContent = '0';
    timerBar.style.width = '0%';
    timerBox.classList.add('done');
    return;
  }
  timerBox.classList.remove('done');
  const elapsed = (serverNow() - (st.startedAt || serverNow())) / 1000;
  const remaining = Math.max(0, Math.ceil(duration - elapsed));
  timerSec.textContent = remaining;
  timerBar.style.width = Math.max(0, (1 - elapsed/duration) * 100) + '%';
}

/* ---------- Confetti (small, dependency-free) ---------- */
function fireConfetti() {
  const canvas = document.getElementById('confetti');
  canvas.classList.remove('hidden');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const colors = ['#e91e63','#2e7d32','#f2c94c','#5b9bd5'];
  const pieces = Array.from({length:120}, () => ({
    x: Math.random()*canvas.width,
    y: -20 - Math.random()*canvas.height*0.5,
    r: 4 + Math.random()*5,
    c: colors[Math.floor(Math.random()*colors.length)],
    vy: 2 + Math.random()*3,
    vx: -1.5 + Math.random()*3,
    rot: Math.random()*360,
    vr: -6 + Math.random()*12
  }));
  let frame = 0;
  const maxFrames = 260;
  (function loop() {
    frame++;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.rot += p.vr;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot * Math.PI/180);
      ctx.fillStyle = p.c;
      ctx.fillRect(-p.r/2, -p.r/2, p.r, p.r*1.6);
      ctx.restore();
    });
    if (frame < maxFrames) requestAnimationFrame(loop);
    else canvas.classList.add('hidden');
  })();
}

function esc(s) {
  return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}
</script>
