<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Голосование · Квиз</title>
<style>
  :root {
    --bg: #f6f4ee;
    --card: #ffffff;
    --line: #e5e0d3;
    --ink: #171b22;
    --dim: #7b8290;
    --pink: #e91e63;
    --pink-soft: #fce4ec;
    --green: #2e7d32;
    --green-soft: #e8f5e9;
    --red: #c0392b;
    --red-soft: #fdecea;
    --mono: 'JetBrains Mono', ui-monospace, Consolas, monospace;
    --ease: cubic-bezier(.4,0,.2,1);
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { width:100%; height:100%; overflow:hidden; }
  body {
    background:
      radial-gradient(900px 400px at 100% -10%, #fde3ec 0%, transparent 55%),
      radial-gradient(700px 400px at -10% 110%, #e6f3e7 0%, transparent 55%),
      var(--bg);
    color: var(--ink);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    padding: 14px;
  }
  .screen { width:100%; max-width:520px; height:calc(100vh - 28px); margin:0 auto; display:flex; flex-direction:column; justify-content:center; gap:12px; }
  .top { font-family:var(--mono); font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:var(--pink); text-align:center; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:20px; padding:18px; box-shadow:0 2px 14px rgba(23,27,34,.05); animation: pop .25s var(--ease); }
  @keyframes pop { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

  .name-form { display:flex; flex-direction:column; gap:12px; }
  input {
    width:100%; padding:15px 16px; border:1px solid var(--line); border-radius:14px;
    font-size:18px; font-family:inherit; color:var(--ink); background:var(--card);
  }
  input:focus { outline:none; border-color:var(--pink); box-shadow:0 0 0 3px rgba(233,30,99,.12); }
  button {
    width:100%; border:none; border-radius:14px; padding:14px; font-family:inherit;
    font-size:16px; font-weight:800; cursor:pointer; background:var(--pink); color:#fff;
    transition:transform .12s, opacity .2s;
  }
  button:active:not(:disabled) { transform:scale(.98); }
  button:disabled { opacity:.5; cursor:default; }

  .state { text-align:center; color:var(--dim); font-size:17px; line-height:1.45; }
  .state-title { color:var(--ink); font-size:23px; font-weight:800; margin-bottom:6px; }
  .pulse-dot { width:8px; height:8px; border-radius:50%; background:var(--pink); margin:0 auto 14px; animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity:.3; transform:scale(.8); } 50% { opacity:1; transform:scale(1.2); } }

  .score-pill {
    align-self:center; background:var(--card); border:1px solid var(--line); border-radius:999px;
    padding:8px 16px; font-size:13px; font-weight:800; color:var(--pink); box-shadow:0 2px 8px rgba(23,27,34,.05);
  }

  .qcounter { text-align:center; font-family:var(--mono); font-size:11px; letter-spacing:.1em; color:var(--dim); text-transform:uppercase; margin-bottom:2px; }

  .timer-wrap { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
  .timer-track { flex:1; height:6px; background:#f0ede8; border-radius:999px; overflow:hidden; }
  .timer-fill { height:100%; background:var(--pink); width:100%; transition:width .1s linear, background .3s; border-radius:999px; }
  .timer-fill.low { background:var(--red); }
  .timer-num { font-variant-numeric:tabular-nums; font-weight:900; color:var(--pink); font-size:15px; min-width:26px; text-align:right; }

  h1 { font-size:clamp(18px,5vw,25px); line-height:1.2; font-weight:850; margin-bottom:14px; }

  .opts { display:flex; flex-direction:column; gap:9px; }
  .opt {
    background:var(--card); border:1.5px solid var(--line); border-radius:14px; padding:13px 14px;
    font-size:clamp(14px,4vw,16.5px); line-height:1.25; font-weight:700; color:var(--ink);
    text-align:left; box-shadow:0 1px 3px rgba(23,27,34,.04); transition: all .2s var(--ease);
  }
  .opt:active:not(:disabled) { transform:scale(.985); }
  .opt.sel { border-color:var(--pink); background:var(--pink-soft); box-shadow:0 0 0 3px rgba(233,30,99,.12); }
  .opt.correct-answer { border-color:var(--green); background:var(--green-soft); color:var(--green); font-weight:900; }
  .opt.wrong-answer { border-color:var(--red); background:var(--red-soft); }
  .opt:disabled { cursor:default; }

  .hint { text-align:center; color:var(--dim); font-size:12.5px; line-height:1.4; }
  .link-btn { background:none; border:none; color:var(--dim); font-size:12.5px; text-decoration:underline; padding:2px; width:auto; align-self:center; font-weight:600; }

  .final-score { font-size:52px; font-weight:900; color:var(--pink); text-align:center; margin:6px 0; }
  .final-total { text-align:center; color:var(--dim); font-size:14px; margin-bottom:2px; }
</style>
</head>
<body>
<div class="screen">
  <div class="top">ИИ для аудиторов · квиз</div>
  <div id="app"></div>
</div>

<script src="./config.js?v=6"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>

<script>
const app = document.getElementById('app');
const cfg = window.QUIZ_CONFIG || {};
if (!cfg.firebase || !cfg.firebase.apiKey) {
  app.innerHTML = '<div class="card state"><div class="state-title">Ошибка</div>Нет config.js</div>';
  throw new Error('config missing');
}
firebase.initializeApp(cfg.firebase);
const db = firebase.database();

const QUESTIONS = {
  q1: { q:'Что может утечь при использовании внешней модели по API?', options:['промпт и ответ в логах','данные для дообучения','токены','всё вышеперечисленное'], correct:3 },
  q2: { q:'Что нельзя отправлять во внешние модели?', options:['шаблоны договоров','обезличенные данные','персональные и финансовые данные','данные для обучения модели'], correct:2 },
  q3: { q:'Какой промпт даст структурированный результат при проверке договора?', options:['«Проверь договор аренды»','«Найди риски для арендатора»','«Проверь по чек-листу: индексация, разрыв, штрафы, субаренда. Дай цитату, риск и оценку»'], correct:2 },
  q4: { q:'Какой из перечисленных инструментов Яндекса представляет собой веб-агента без установки (работает с Календарём, Трекером, Вики, Почтой)?', options:['Стефания','MARS','Гена (GENA)','Клешня Алисы Про'], correct:3 },
  q5: { q:'Что такое MCP в контексте AI-агентов?', options:['метод машинного обучения','стандарт подключения модели к сервисам («розетка» для инструментов)','тип языковой модели','способ шифрования данных'], correct:1 },
  q6: { q:'Что такое «промпт» в контексте работы языковых моделей?', options:['алгоритм обучения модели','запрос или инструкция, подаваемая на вход модели','метод оценки качества ответов модели','тип нейросети'], correct:1 },
  q7: { q:'Каким способом можно переключить модель со внешней на внутреннюю в Стефании?', options:['ввести в терминале «Поменяй модель»','через команду ccr-switch','через команду /model'], correct:1 },
  q8: { q:'Вы распознаёте номер автомобиля по фото — какой тип AI используется?', options:['Claude Code','Deeplearning','LLM','Транзакционный ИИ','Дискриминационный ИИ'], correct:1 },
  q9: { q:'Вы начали пользоваться ролями агентов и навыками — как изменился расход токенов?', options:['расход токенов увеличился','расход токенов уменьшился','расход токенов не изменился'], correct:0 },
  q10: { q:'Вы начали пользоваться ролями агентов и навыками — как изменилась точность ответов?', options:['точность ответов увеличилась','точность ответов уменьшилась','точность ответов не изменилась'], correct:0 }
};
const QUESTION_ORDER = ['q1','q2','q3','q4','q5','q6','q7','q8','q9','q10'];

/* ---------- Server-synced clock ---------- */
let serverOffset = 0;
db.ref('.info/serverTimeOffset').on('value', snap => { serverOffset = snap.val() || 0; });
function serverNow() { return Date.now() + serverOffset; }

/* ---------- Local identity (not gated on any race with Firebase) ---------- */
let myName = localStorage.getItem('quizUserName') || '';
let responsesCache = {};
let selectedAnswer = null;
let renderedKey = '';
let uiTicker = null;
let latestState = { status: 'idle' };

/* ---------- Boot: show a neutral loader until we get real state ---------- */
app.innerHTML = `<div class="card state"><div class="pulse-dot"></div>Подключение…</div>`;

db.ref('responses').on('value', snap => {
  responsesCache = snap.val() || {};
  if (document.querySelector('.score-pill')) updateScorePill();
});

db.ref('state').on('value', snap => {
  const st = snap.val() || { status: 'idle' };
  latestState = st;
  route(st);
});

function route(st) {
  if (!myName) { renderedKey = ''; showNameForm(); return; }

  const status = st.status || 'idle';

  if (status === 'idle') {
    const key = 'idle';
    if (renderedKey !== key) { renderedKey = key; showWaiting('Ожидайте начала квиза'); }
    return;
  }

  if (status === 'finished') {
    const key = 'finished';
    if (renderedKey !== key) { renderedKey = key; showFinished(); }
    return;
  }

  // active or revealed
  const key = st.qid + ':' + status;
  if (renderedKey !== key) {
    renderedKey = key;
    renderPoll(st);
  } else if (status === 'revealed') {
    // make sure reveal styling is applied even if we were already showing this poll
    applyReveal(st);
  }
}

function showNameForm() {
  stopTicker();
  const saved = localStorage.getItem('quizUserName') || '';
  app.innerHTML = `
    <div class="card name-form">
      <input id="nameInput" type="text" placeholder="Введите ваш ник" value="${esc(saved)}" autofocus maxlength="40">
      <button id="nameBtn">Продолжить</button>
    </div>
    <div class="hint">Ник нужен для итогового рейтинга</div>
  `;
  const input = document.getElementById('nameInput');
  const btn = document.getElementById('nameBtn');

  const submit = () => {
    const val = input.value.trim();
    if (!val) { input.focus(); return; }
    myName = val;
    localStorage.setItem('quizUserName', myName);
    selectedAnswer = null;
    renderedKey = '';
    db.ref('state').once('value').then(snap => route(snap.val() || { status:'idle' }));
  };

  btn.addEventListener('click', submit);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
  setTimeout(() => input.focus(), 100);
}

function showWaiting(text) {
  stopTicker();
  app.innerHTML = `
    <div class="score-pill" id="scorePill">Правильных ответов: ${myScore()}</div>
    <div class="card state">
      <div class="pulse-dot"></div>
      <div class="state-title">${esc(text)}</div>
      <div>Вопрос появится автоматически</div>
    </div>
    <button class="link-btn" id="changeNameBtn">Не я — сменить ник</button>
  `;
  document.getElementById('changeNameBtn').addEventListener('click', () => {
    myName = '';
    localStorage.removeItem('quizUserName');
    renderedKey = '';
    showNameForm();
  });
}

function renderPoll(st) {
  selectedAnswer = null;
  stopTicker();

  const qData = QUESTIONS[st.qid];
  app.innerHTML = `
    <div class="score-pill" id="scorePill">Правильных ответов: ${myScore()}</div>
    <div class="card">
      <div class="qcounter">Вопрос ${(st.index ?? 0)+1} из ${st.total || QUESTION_ORDER.length}</div>
      <div class="timer-wrap">
        <div class="timer-track"><div class="timer-fill" id="timerFill"></div></div>
        <div class="timer-num" id="timerNum">${st.duration || 15}</div>
      </div>
      <h1>${esc(qData.q)}</h1>
      <div class="opts">
        ${qData.options.map((o,i) => `<button class="opt" data-i="${i}">${esc(o)}</button>`).join('')}
      </div>
    </div>
  `;

  app.querySelectorAll('.opt').forEach(btn => {
    btn.addEventListener('click', () => vote(st, Number(btn.dataset.i)));
  });

  checkExistingVote(st);
  startTicker(st);
  if (st.status === 'revealed') applyReveal(st);
}

async function checkExistingVote(st) {
  const snap = await db.ref('responses/' + st.qid + '/' + safeKey(myName)).once('value');
  if (snap.exists()) {
    selectedAnswer = Number(snap.val().answer);
    lockOptions();
    const btn = app.querySelector(`.opt[data-i="${selectedAnswer}"]`);
    if (btn) btn.classList.add('sel');
  }
}

async function vote(st, answerIndex) {
  if (selectedAnswer !== null) return;
  if (st.status !== 'active') return;

  selectedAnswer = answerIndex;
  lockOptions();
  const btn = app.querySelector(`.opt[data-i="${answerIndex}"]`);
  if (btn) btn.classList.add('sel');

  try {
    await db.ref('responses/' + st.qid + '/' + safeKey(myName)).set({
      name: myName,
      answer: answerIndex,
      ts: firebase.database.ServerValue.TIMESTAMP
    });
  } catch (e) {
    console.error(e);
    selectedAnswer = null;
    unlockOptions();
    if (btn) btn.classList.remove('sel');
    alert('Не удалось отправить ответ, попробуйте ещё раз');
  }
}

function lockOptions() { app.querySelectorAll('.opt').forEach(b => b.disabled = true); }
function unlockOptions() { app.querySelectorAll('.opt').forEach(b => b.disabled = false); }

function applyReveal(st) {
  stopTicker();
  const qData = QUESTIONS[st.qid];
  if (!qData) return;
  lockOptions();
  const timerFill = document.getElementById('timerFill');
  const timerNum = document.getElementById('timerNum');
  if (timerFill) timerFill.style.width = '0%';
  if (timerNum) timerNum.textContent = '0';

  app.querySelectorAll('.opt').forEach(btn => {
    const idx = Number(btn.dataset.i);
    if (idx === qData.correct) btn.classList.add('correct-answer');
    else if (selectedAnswer !== null && idx === selectedAnswer) btn.classList.add('wrong-answer');
  });

  updateScorePill();
}

function startTicker(st) {
  stopTicker();
  const tick = () => {
    const duration = st.duration || 15;
    const elapsed = (serverNow() - (st.startedAt || serverNow())) / 1000;
    const remaining = Math.max(0, duration - elapsed);
    const fill = document.getElementById('timerFill');
    const num = document.getElementById('timerNum');
    if (fill) {
      fill.style.width = Math.max(0, (remaining/duration)*100) + '%';
      fill.classList.toggle('low', remaining <= 4);
    }
    if (num) num.textContent = Math.ceil(remaining);
  };
  tick();
  uiTicker = setInterval(tick, 100);
}
function stopTicker() { if (uiTicker) { clearInterval(uiTicker); uiTicker = null; } }

function myScore() {
  const st = latestState;
  if (!st || !st.status || st.status === 'idle') return 0;

  const currentIndex = st.index ?? -1;
  const myKey = safeKey(myName);
  let score = 0;

  QUESTION_ORDER.forEach((qid, i) => {
    // A question only counts once its correct answer has actually been
    // revealed to everyone (timer ended) — never the instant someone taps
    // an option, and never for the question that's still running.
    const isRevealed = st.status === 'finished'
      || i < currentIndex
      || (i === currentIndex && st.status === 'revealed');
    if (!isRevealed) return;

    const resp = responsesCache[qid]?.[myKey];
    if (resp && Number(resp.answer) === QUESTIONS[qid].correct) score++;
  });
  return score;
}

function updateScorePill() {
  const pill = document.getElementById('scorePill');
  if (pill) pill.textContent = `Правильных ответов: ${myScore()}`;
}

function showFinished() {
  stopTicker();
  const score = myScore();
  app.innerHTML = `
    <div class="card state">
      <div class="final-total">Ваш результат</div>
      <div class="final-score">${score}<span style="font-size:22px;color:var(--dim);font-weight:700;"> / ${QUESTION_ORDER.length}</span></div>
      <div class="state-title" style="margin-top:8px;">Квиз завершён 🎉</div>
      <div>Спасибо за участие!</div>
    </div>
  `;
}

function safeKey(name) {
  return String(name).trim().replace(/[.#$\[\]\/]/g, '_').slice(0, 80);
}
function esc(s) {
  return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}
</script>
</body>
</html>
