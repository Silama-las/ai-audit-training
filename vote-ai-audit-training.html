<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Голосование</title>
  <style>
    :root {
      --bg: #f6f4ee;
      --card: #ffffff;
      --line: #e2ddd0;
      --ink: #171b22;
      --dim: #5d6673;
      --pink: #e91e63;
      --green: #2e7d32;
      --red: #c0392b;
      --mono: 'JetBrains Mono', ui-monospace, Consolas, monospace;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      padding: 12px;
    }

    .screen {
      width: 100%;
      max-width: 520px;
      height: calc(100vh - 24px);
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 12px;
    }

    .top {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--pink);
      text-align: center;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 1px 2px rgba(23,27,34,.05);
    }

    .name-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 12px;
      font-size: 18px;
      font-family: inherit;
      color: var(--ink);
      background: var(--card);
    }

    input:focus {
      outline: none;
      border-color: var(--pink);
    }

    button {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 13px 14px;
      font-family: inherit;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      background: var(--pink);
      color: #fff;
    }

    button:disabled {
      opacity: .55;
      cursor: default;
    }

    .state {
      text-align: center;
      color: var(--dim);
      font-size: 18px;
      line-height: 1.45;
    }

    .state-title {
      color: var(--ink);
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .score-pill {
      align-self: center;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 14px;
      font-weight: 800;
      color: var(--pink);
      box-shadow: 0 1px 2px rgba(23,27,34,.05);
    }

    .timer {
      text-align: center;
      color: var(--pink);
      font-size: 20px;
      font-weight: 900;
      margin-bottom: 8px;
    }

    h1 {
      font-size: clamp(18px, 5vw, 25px);
      line-height: 1.18;
      font-weight: 850;
      margin-bottom: 12px;
    }

    .opts {
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    .opt {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: clamp(14px, 4vw, 17px);
      line-height: 1.22;
      font-weight: 700;
      color: var(--ink);
      text-align: left;
      box-shadow: 0 1px 2px rgba(23,27,34,.05);
    }

    .opt.sel {
      border-color: var(--pink);
      background: #fce4ec;
      box-shadow: 0 0 0 3px rgba(233,30,99,.12);
    }

    .opt.correct-answer {
      border-color: var(--green);
      background: #e8f5e9;
      color: var(--green);
      font-weight: 900;
    }

    .opt.wrong-answer {
      border-color: var(--red);
      background: #fdecea;
    }

    .hint {
      text-align: center;
      color: var(--dim);
      font-size: 13px;
      line-height: 1.35;
    }
  </style>
</head>
<body>
<div class="screen">
  <div class="top">ИИ для аудиторов · квиз</div>
  <div id="app"></div>
</div>

<script src="config.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>

<script>
const app = document.getElementById('app');

const cfg = window.QUIZ_CONFIG || {};
if (!cfg.firebase || !cfg.firebase.apiKey) {
  app.innerHTML = '<div class="card state"><div class="state-title">Ошибка</div>Нет config.js</div>';
  throw new Error('config missing');
}

firebase.initializeApp(cfg.firebase);
const db = firebase.database();

const QUESTION_ORDER = ['q1','q2','q3','q4','q5','q6','q7'];

const QUESTIONS_META = {
  q1: { correct: 2 },
  q2: { correct: 2 },
  q3: { correct: 2 },
  q4: { correct: 3 },
  q5: { correct: 1 },
  q6: { correct: 1 },
  q7: { correct: 2 }
};

let myName = '';
let currentSession = null;
let savedSession = localStorage.getItem('quizSession') || '';
let savedName = localStorage.getItem('quizUserName') || '';

let currentPollId = null;
let timerInterval = null;
let selectedAnswer = null;
let myScore = 0;
let lastRenderedKey = '';

function showNameForm() {
  if (timerInterval) clearInterval(timerInterval);

  app.innerHTML = `
    <div class="card name-form">
      <input id="nameInput" type="text" placeholder="Введите ваш ник" value="${esc(savedName)}" autofocus>
      <button id="nameBtn">Продолжить</button>
    </div>
    <div class="hint">Ник нужен для итогового рейтинга</div>
  `;

  const input = document.getElementById('nameInput');
  const btn = document.getElementById('nameBtn');

  btn.addEventListener('click', () => {
    const val = input.value.trim();

    if (!val) {
      alert('Пожалуйста, введите ник');
      return;
    }

    myName = val;
    savedName = val;

    localStorage.setItem('quizUserName', myName);

    if (currentSession) {
      localStorage.setItem('quizSession', String(currentSession));
      savedSession = String(currentSession);
    }

    myScore = 0;
    selectedAnswer = null;
    currentPollId = null;
    lastRenderedKey = '';

    showWaiting();
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') btn.click();
  });

  setTimeout(() => input.focus(), 100);
}

function showWaiting(text = 'Ожидайте начала квиза') {
  if (!myName) {
    showNameForm();
    return;
  }

  if (timerInterval) clearInterval(timerInterval);

  app.innerHTML = `
    <div class="score-pill">Правильных ответов: ${myScore}</div>
    <div class="card state">
      <div class="state-title">${esc(text)}</div>
      <div>Вопрос появится автоматически</div>
    </div>
  `;
}

function renderPoll(poll) {
  if (!myName) {
    showNameForm();
    return;
  }

  if (currentPollId !== poll.id) {
    selectedAnswer = null;
  }

  currentPollId = poll.id;

  if (timerInterval) clearInterval(timerInterval);

  const timeLimit = Number(poll.time || 15);

  app.innerHTML = `
    <div class="score-pill">Правильных ответов: ${myScore}</div>

    <div class="card">
      <div class="timer">Осталось: <span id="timerVote">${timeLimit}</span> сек</div>
      <h1>${esc(poll.q)}</h1>

      <div class="opts">
        ${poll.options.map((o, i) => `
          <button class="opt" data-i="${i}">${esc(o)}</button>
        `).join('')}
      </div>
    </div>
  `;

  app.querySelectorAll('.opt').forEach(btn => {
    btn.addEventListener('click', () => vote(poll, Number(btn.dataset.i)));
  });

  checkExistingVote(poll);

  let remaining = timeLimit;
  const timerEl = document.getElementById('timerVote');

  timerInterval = setInterval(() => {
    remaining--;
    if (timerEl) timerEl.textContent = Math.max(remaining, 0);

    if (remaining <= 0) {
      clearInterval(timerInterval);
      timerInterval = null;
    }
  }, 1000);
}

async function checkExistingVote(poll) {
  if (!myName) return;

  const voteRef = db.ref('responses/' + poll.id + '/' + safeKey(myName));
  const snap = await voteRef.once('value');

  if (snap.exists()) {
    const data = snap.val();
    selectedAnswer = Number(data.answer);

    const btn = app.querySelector(`.opt[data-i="${selectedAnswer}"]`);
    if (btn) btn.classList.add('sel');

    app.querySelectorAll('.opt').forEach(b => b.disabled = true);
  }

  if (poll.status === 'revealed') {
    revealCorrectToUser(poll);
  }
}

async function vote(poll, answerIndex) {
  if (!myName) return;
  if (selectedAnswer !== null) return;
  if (poll.status !== 'active') return;

  selectedAnswer = answerIndex;

  const buttons = app.querySelectorAll('.opt');
  buttons.forEach(b => b.disabled = true);

  const selectedBtn = app.querySelector(`.opt[data-i="${answerIndex}"]`);
  if (selectedBtn) selectedBtn.classList.add('sel');

  try {
    await db.ref('responses/' + poll.id + '/' + safeKey(myName)).set({
      name: myName,
      answer: answerIndex,
      timestamp: firebase.database.ServerValue.TIMESTAMP
    });

    await updateMyScore();
  } catch(e) {
    alert('Ошибка, попробуйте ещё раз');
    selectedAnswer = null;
    buttons.forEach(b => b.disabled = false);
    if (selectedBtn) selectedBtn.classList.remove('sel');
  }
}

function revealCorrectToUser(poll) {
  if (timerInterval) clearInterval(timerInterval);

  const correctIdx = Number(poll.correct);
  const buttons = app.querySelectorAll('.opt');

  buttons.forEach(btn => {
    const idx = Number(btn.dataset.i);
    btn.disabled = true;

    if (idx === correctIdx) {
      btn.classList.add('correct-answer');
    }

    if (selectedAnswer !== null && idx === selectedAnswer && selectedAnswer !== correctIdx) {
      btn.classList.add('wrong-answer');
    }
  });
}

async function updateMyScore() {
  if (!myName) {
    myScore = 0;
    return;
  }

  let score = 0;

  for (const qid of QUESTION_ORDER) {
    const snap = await db.ref('responses/' + qid + '/' + safeKey(myName)).once('value');
    const data = snap.val();

    if (data && Number(data.answer) === QUESTIONS_META[qid].correct) {
      score++;
    }
  }

  myScore = score;

  const pill = document.querySelector('.score-pill');
  if (pill) {
    pill.textContent = `Правильных ответов: ${myScore}`;
  }
}

async function showFinished() {
  await updateMyScore();

  app.innerHTML = `
    <div class="score-pill">Ваш результат: ${myScore}</div>
    <div class="card state">
      <div class="state-title">Квиз завершён</div>
      <div>Спасибо за участие</div>
    </div>
  `;
}

db.ref('state').on('value', async (snap) => {
  const state = snap.val() || {};
  const poll = state.currentPoll || null;
  const firebaseSession = state.session ? String(state.session) : '';

  if (firebaseSession && firebaseSession !== String(currentSession)) {
    currentSession = firebaseSession;
  }

  const localSession = localStorage.getItem('quizSession') || '';

  if (!firebaseSession) {
    showNameForm();
    return;
  }

  if (firebaseSession !== localSession) {
    myName = '';
    myScore = 0;
    selectedAnswer = null;
    currentPollId = null;
    lastRenderedKey = '';
    showNameForm();
    return;
  }

  myName = localStorage.getItem('quizUserName') || '';

  if (!myName) {
    showNameForm();
    return;
  }

  await updateMyScore();

  if (state.quizStatus === 'finished') {
    showFinished();
    return;
  }

  if (!poll || !poll.id) {
    showWaiting('Ожидайте начала квиза');
    return;
  }

  const renderKey = poll.id + ':' + poll.status;

  if (poll.status === 'active') {
    if (lastRenderedKey !== renderKey) {
      lastRenderedKey = renderKey;
      renderPoll(poll);
    }
    return;
  }

  if (poll.status === 'revealed') {
    if (currentPollId !== poll.id) {
      renderPoll(poll);
    }

    revealCorrectToUser(poll);
    lastRenderedKey = renderKey;
  }
});

db.ref('responses').on('value', () => {
  updateMyScore();
});

function safeKey(name) {
  return String(name)
    .trim()
    .replace(/[.#$\[\]\/]/g, '_')
    .slice(0, 80);
}

function esc(s) {
  return String(s).replace(/[&<>"]/g, c => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;'
  }[c]));
}

showNameForm();
</script>
</body>
</html>
