<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Голосование</title>
  <style>
    :root {
      --bg: #f6f4ee;
      --card: #ffffff;
      --line: #e2ddd0;
      --ink: #171b22;
      --dim: #5d6673;
      --pink: #e91e63;
      --green: #2e7d32;
      --mono: 'JetBrains Mono', ui-monospace, Consolas, monospace;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      /* уменьшаем масштаб для мобильных */
      font-size: 15px;
    }
    .top {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--pink);
      margin-bottom: 12px;
      text-align: center;
    }
    h1 {
      font-size: 20px;
      font-weight: 800;
      line-height: 1.3;
      margin-bottom: 16px;
    }
    .opts {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .opt {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      color: var(--ink);
      text-align: left;
      box-shadow: 0 1px 2px rgba(23,27,34,.05);
      transition: transform .12s, border-color .2s, background .2s;
      font-family: inherit;
    }
    .opt:active { transform: scale(.975); }
    .opt.sel {
      border-color: var(--pink);
      background: #fce4ec;
      box-shadow: 0 0 0 3px rgba(233,30,99,.12);
    }
    .opt:disabled {
      opacity: 0.5;
      cursor: default;
      transform: none;
    }
    .opt.correct-answer {
      border-color: var(--green);
      background: #e8f5e9;
      font-weight: 700;
    }
    .name-input {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
    }
    .name-input input {
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 12px;
      font-size: 18px;
      font-family: inherit;
      background: var(--card);
      color: var(--ink);
      width: 100%;
    }
    .name-input input:focus {
      outline: none;
      border-color: var(--pink);
    }
    .name-input button {
      padding: 14px;
      background: var(--pink);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background .2s;
    }
    .name-input button:active { background: #c2185b; }
    .state {
      text-align: center;
      color: var(--dim);
      font-size: 16px;
      line-height: 1.6;
      padding: 30px 10px;
    }
    .state .big { font-size: 44px; margin-bottom: 12px; }
    .state b { color: var(--green); }
    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--pink);
      animation: blink 1.2s ease-in-out infinite;
      margin: 0 3px;
    }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes blink {
      0%,100% { opacity: .2; }
      50% { opacity: 1; }
    }
    .timer-info {
      font-weight: 700;
      color: var(--pink);
      font-size: 16px;
      margin-bottom: 10px;
      text-align: center;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="top">ИИ для аудиторов · квиз</div>
<div id="app"></div>

<script src="config.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
<script>
const app = document.getElementById('app');
const cfg = window.QUIZ_CONFIG || {};
if (!cfg.firebase || !cfg.firebase.apiKey) {
  app.innerHTML = `<div class="state"><div class="big">⚠️</div>Ошибка: нет config.js</div>`;
  throw new Error('config missing');
}
firebase.initializeApp(cfg.firebase);
const db = firebase.database();

let myName = localStorage.getItem('quizUserName') || '';
let currentPoll = null;
let timerInterval = null;
let isAnswered = false;
let isCorrectRevealed = false;

// === ВВОД ИМЕНИ ===
function askName() {
  return new Promise((resolve) => {
    if (myName && myName.trim()) {
      resolve(myName);
      return;
    }
    app.innerHTML = `
      <div class="name-input">
        <input id="nameInput" type="text" placeholder="Введите ваш ник" value="${myName}" autofocus>
        <button id="nameBtn">Продолжить</button>
      </div>
      <div style="text-align:center;font-size:13px;color:var(--dim);">Это нужно для рейтинга</div>
    `;
    document.getElementById('nameBtn').addEventListener('click', () => {
      const val = document.getElementById('nameInput').value.trim();
      if (val) {
        myName = val;
        localStorage.setItem('quizUserName', myName);
        resolve(myName);
      } else {
        alert('Пожалуйста, введите ник');
      }
    });
    document.getElementById('nameInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('nameBtn').click();
    });
    document.getElementById('nameInput').focus();
  });
}

// === ПОДПИСКА НА ТЕКУЩИЙ ВОПРОС ===
db.ref('state/currentPoll').on('value', async (snap) => {
  const poll = snap.val();
  if (!poll || !poll.id) {
    currentPoll = null;
    app.innerHTML = `<div class="state"><div class="big">⏳</div>Ожидание вопроса…</div>`;
    return;
  }
  if (currentPoll && currentPoll.id === poll.id) return;
  currentPoll = poll;

  if (!myName) await askName();

  // Проверяем, голосовал ли уже этот пользователь
  const voteRef = db.ref('responses/' + poll.id + '/' + myName);
  const snapshot = await voteRef.once('value');
  if (snapshot.exists()) {
    // Уже голосовал – показываем сообщение, но если вопрос ещё не завершён, покажем ответ?
    // Мы будем показывать ответ, если он уже был раскрыт (correctRevealed)
    // Но лучше просто показать "Вы уже ответили" и ждать следующего вопроса.
    app.innerHTML = `<div class="state"><div class="big">✓</div><b>Вы уже ответили.</b><br>Ждём следующий вопрос.</div>`;
    return;
  }

  // Рендерим вопрос
  renderPoll(poll);
});

function renderPoll(poll) {
  isAnswered = false;
  isCorrectRevealed = false;
  if (timerInterval) clearInterval(timerInterval);

  // Показываем таймер (время берём из вопроса, но у нас его нет в poll? Добавим в QUESTIONS на клиенте)
  // Но poll приходит от ведущего, там только q, options, correct, id. Время мы знаем из QUESTIONS.
  // Получим время из конфига
  const qData = window.QUESTIONS ? window.QUESTIONS[poll.id] : null;
  const timeLimit = (qData && qData.time) ? qData.time : 15;

  app.innerHTML = `
    <div class="timer-info">⏱️ <span id="timerVote">${timeLimit}</span> сек</div>
    <h1>${esc(poll.q)}</h1>
    <div class="opts">
      ${poll.options.map((o, i) => `<button class="opt" data-i="${i}">${esc(o)}</button>`).join('')}
    </div>
  `;

  // Обработчики кликов
  app.querySelectorAll('.opt').forEach(btn => {
    btn.addEventListener('click', () => vote(poll.id, +btn.dataset.i, btn));
  });

  // Запускаем таймер, который по окончании покажет правильный ответ
  let remaining = timeLimit;
  const timerEl = document.getElementById('timerVote');
  timerInterval = setInterval(() => {
    remaining--;
    if (timerEl) timerEl.textContent = remaining;
    if (remaining <= 0) {
      clearInterval(timerInterval);
      timerInterval = null;
      // Показываем правильный ответ на стороне участника
      revealCorrectToUser(poll);
    }
  }, 1000);
}

function revealCorrectToUser(poll) {
  if (isCorrectRevealed) return;
  isCorrectRevealed = true;
  const correctIdx = poll.correct;
  const allOpts = app.querySelectorAll('.opt');
  allOpts.forEach((btn, i) => {
    btn.disabled = true;
    if (i === correctIdx) {
      btn.classList.add('correct-answer');
    }
  });
  // Дополнительно покажем сообщение
  // Но можно просто подсветить.
}

async function vote(questionId, answerIndex, btn) {
  if (isAnswered) return;
  if (!myName) return;
  // Блокируем все кнопки
  app.querySelectorAll('.opt').forEach(b => b.disabled = true);
  btn.classList.add('sel');
  isAnswered = true;

  try {
    await db.ref('responses/' + questionId + '/' + myName).set({
      name: myName,
      answer: answerIndex,
      timestamp: firebase.database.ServerValue.TIMESTAMP
    });
    // Показываем спасибо, но не перекрываем вопрос – можно оставить как есть, кнопки заблокированы.
    // Вместо этого покажем текст "Голос принят" в таймере или сверху.
    const timerEl = document.getElementById('timerVote');
    if (timerEl) timerEl.textContent = '✅';
  } catch(e) {
    alert('Ошибка, попробуйте ещё раз');
    app.querySelectorAll('.opt').forEach(b => b.disabled = false);
    btn.classList.remove('sel');
    isAnswered = false;
  }
}

function esc(s) { return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

// Сохраним QUESTIONS для доступа к времени
window.QUESTIONS = {
  q1: { time: 15 },
  q2: { time: 15 },
  q3: { time: 15 },
  q4: { time: 15 },
  q5: { time: 15 },
  q6: { time: 15 },
  q7: { time: 15 }
};

// Если нет имени – показать запрос
if (!myName) askName();
</script>
</body>
</html>
